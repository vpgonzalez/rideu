default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV["DB_USERNAME"] || "postgres" %>
  password: <%= ENV["DB_PASSWORD"] || "" %>
  host: localhost

development:
  <<: *default
  database: rideu_development

test:
  <<: *default
  database: rideu_test

production:
  <<: *default
  database: rideu_production
  username: rideu
  password: <%= ENV["RIDEU_DATABASE_PASSWORD"] %>